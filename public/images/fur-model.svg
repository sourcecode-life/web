<svg viewBox="0 0 750 550" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <!-- Soul Upgrade Circle -->
  <circle cx="375" cy="100" r="70" fill="#4ade80" fill-opacity="0.2" stroke="#4ade80" stroke-width="2"/>
  <text x="375" y="90" font-size="22" font-weight="bold" fill="#4ade80" text-anchor="middle">Soul</text>
  <text x="375" y="118" font-size="22" font-weight="bold" fill="#4ade80" text-anchor="middle">Upgrade</text>

  <!-- Fix Box -->
  <rect x="40" y="400" width="140" height="120" rx="12" fill="#374151" fill-opacity="0.5" stroke="#6b7280" stroke-width="2"/>
  <text x="110" y="455" font-size="52" fill="#facc15" text-anchor="middle">修</text>
  <text x="110" y="502" font-size="20" fill="#facc15" text-anchor="middle">Fix</text>

  <!-- Run Box -->
  <rect x="570" y="400" width="140" height="120" rx="12" fill="#374151" fill-opacity="0.5" stroke="#6b7280" stroke-width="2"/>
  <text x="640" y="455" font-size="52" fill="#60a5fa" text-anchor="middle">行</text>
  <text x="640" y="502" font-size="20" fill="#60a5fa" text-anchor="middle">Run</text>

  <!-- Center text -->
  <text x="375" y="310" font-size="24" font-weight="600" fill="#d1d5db" text-anchor="middle">Inner</text>
  <text x="375" y="340" font-size="24" font-weight="600" fill="#d1d5db" text-anchor="middle">Evolution</text>

  <!-- Arrow: Fix to Upgrade -->
  <line x1="145" y1="400" x2="315" y2="170" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="315,170 303,180 311,184" fill="#9ca3af"/>
  <text x="195" y="270" font-size="16" fill="#9ca3af" transform="rotate(-54 195,270)">Fix bugs</text>

  <!-- Arrow: Upgrade to Run -->
  <line x1="435" y1="170" x2="605" y2="400" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="605,400 597,388 605,390" fill="#9ca3af"/>
  <text x="555" y="270" font-size="16" fill="#9ca3af" transform="rotate(54 555,270)">Run new version</text>

  <!-- Arrow: Run to Fix -->
  <line x1="570" y1="460" x2="180" y2="460" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="180,460 192,454 192,466" fill="#9ca3af"/>
  <text x="375" y="448" font-size="16" fill="#9ca3af" text-anchor="middle">Discover new bugs through life experience</text>
</svg>
