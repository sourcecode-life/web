<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <!-- Gradient for cosmic background -->
    <linearGradient id="cosmicBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Energy gradient -->
    <radialGradient id="energyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ea580c;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#c2410c;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#cosmicBg)"/>

  <!-- Stars -->
  <circle cx="50" cy="50" r="1" fill="white" opacity="0.8"/>
  <circle cx="150" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="250" cy="30" r="1" fill="white" opacity="0.9"/>
  <circle cx="100" cy="150" r="1" fill="white" opacity="0.7"/>
  <circle cx="700" cy="60" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="750" cy="120" r="1" fill="white" opacity="0.6"/>
  <circle cx="650" cy="40" r="1" fill="white" opacity="0.9"/>
  <circle cx="600" cy="350" r="1" fill="white" opacity="0.7"/>
  <circle cx="720" cy="300" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="80" cy="320" r="1" fill="white" opacity="0.6"/>
  <circle cx="200" cy="360" r="1" fill="white" opacity="0.9"/>

  <!-- Atom symbol (left) -->
  <g transform="translate(100, 200)">
    <ellipse cx="0" cy="0" rx="40" ry="15" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="40" ry="15" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.8" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="40" ry="15" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.8" transform="rotate(-60)"/>
    <circle cx="0" cy="0" r="8" fill="#3b82f6"/>
  </g>

  <!-- E=mc² equation (left side) -->
  <text x="150" y="210" font-size="48" font-weight="bold" fill="white" filter="url(#glow)">E=mc</text>
  <text x="310" y="185" font-size="28" font-weight="bold" fill="white" filter="url(#glow)">2</text>

  <!-- Derivation Arrow (mathematical implication symbol) -->
  <text x="400" y="215" font-size="72" fill="#f97316" text-anchor="middle" filter="url(#glow)">⟹</text>

  <!-- m=E/c² equation (right side) -->
  <text x="510" y="215" font-size="48" font-weight="bold" fill="white" filter="url(#glow)">m=</text>
  <text x="615" y="185" font-size="42" font-weight="bold" fill="white" filter="url(#glow)">E</text>
  <line x1="610" y1="200" x2="670" y2="200" stroke="white" stroke-width="3"/>
  <text x="620" y="240" font-size="32" font-weight="bold" fill="white" filter="url(#glow)">c</text>
  <text x="655" y="222" font-size="20" font-weight="bold" fill="white" filter="url(#glow)">2</text>
</svg>
